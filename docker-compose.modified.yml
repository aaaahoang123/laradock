volumes:
  n8n:
    driver: ${VOLUMES_DRIVER}

services:
  postgres:
    environment:
      - FORGEJO_POSTGRES_INIT=${FORGEJO_POSTGRES_INIT}
      - FORGEJO_POSTGRES_USER=${FORGEJO_DB_USER}
      - FORGEJO_POSTGRES_PASSWORD=${FORGEJO_DB_PASSWORD}
      - FORGEJO_POSTGRES_DB=${FORGEJO_DB}
    volumes: !override
      - ${DATA_PATH_HOST}/postgres:/var/lib/postgresql/${POSTGRES_CLIENT_VERSION}/data
      - ${POSTGRES_ENTRYPOINT_INITDB}:/docker-entrypoint-init

  forgejo:
    image: codeberg.org/forgejo/forgejo:11
    container_name: forgejo
    environment:
      - USER_UID=${FORGEJO_USER_UID:-1000}
      - USER_GID=${FORGEJO_USER_GID:-1000}
      - FORGEJO__database__DB_TYPE=${FORGEJO_DB_TYPE}
      - FORGEJO__database__HOST=${FORGEJO_DB_HOST}:${FORGEJO_DB_PORT}
      - FORGEJO__database__NAME=${FORGEJO_DB}
      - FORGEJO__database__USER=${FORGEJO_DB_USER}
      - FORGEJO__database__PASSWD=${FORGEJO_DB_PASSWORD}
      # サーバー設定（ベースURL等） - デフォルト値を192.168.0.131に修正
      - FORGEJO__server__DOMAIN=${FORGEJO_DOMAIN:-192.168.0.131}
      - FORGEJO__server__HTTP_PORT=${FORGEJO_HTTP_PORT:-3000}
      - FORGEJO__server__ROOT_URL=${FORGEJO_ROOT_URL:-http://192.168.0.131:3000/}
      - FORGEJO__server__DISABLE_SSH=${FORGEJO_DISABLE_SSH:-false}
      - FORGEJO__server__SSH_PORT=${FORGEJO_SSH_PORT:-222}
      # Actions設定
      - FORGEJO__actions__ENABLED=${FORGEJO_ACTIONS_ENABLE}
      - FORGEJO__actions__DEFAULT_ACTIONS_URL=https://github.com
    restart: always
    networks:
      - backend
      - frontend
    volumes:
      - ${DATA_PATH_HOST}/forgejo:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - postgres

  elasticsearch:
    volumes:
      - /etc/localtime:/etc/localtime:ro

  kibana:
    environment:
      # - ELASTICSEARCH_HOSTS=["http://10.6.34.6:9200"]
      - ELASTICSEARCH_HOSTS=["http://elasticsearch:9200"]
      #         - ELASTICSEARCH_HOSTS=["http://10.14.34.69:9200"]
      #         - ELASTICSEARCH_HOSTS=["http://192.168.2.22:9201"]
      #         - ELASTICSEARCH_USERNAME=elastic
      #         - ELASTICSEARCH_PASSWORD=TO4KH0U1330oKMQ8xfLUX166

  bitwarden:
    image: vaultwarden/server:${BITWARDEN_VERSION}-alpine
    restart: always
    volumes:
      - ${BITWARDEN_LOG_PATH}:/log
      - ${DATA_PATH_HOST}/bitwarden:/data
    environment:
      - DOMAIN=${BITWARDEN_DOMAIN}
      - SMTP_HOST=${BITWARDEN_SMTP_HOST}
      - SMTP_PORT=${BITWARDEN_SMTP_PORT}
      - SMTP_FROM=${BITWARDEN_SMTP_FROM}
      - SMTP_FROM_NAME=${BITWARDEN_SMTP_FROM_NAME}
      - SMTP_USERNAME=${BITWARDEN_SMTP_USERNAME}
      - SMTP_PASSWORD=${BITWARDEN_SMTP_PASSWORD}
      - SMTP_SECURITY=${BITWARDEN_SMTP_SECURITY}
      - SIGNUPS_ALLOWED=${BITWARDEN_SIGNUPS_ALLOWED}
      - INVITATIONS_ALLOWED=${BITWARDEN_INVITATIONS_ALLOWED}
      - ADMIN_TOKEN=${BITWARDEN_ADMIN_TOKEN}
      - WEBSOCKET_ENABLED=${BITWARDEN_WEBSOCKET_ENABLED}
      - DATABASE_URL=${BITWARDEN_DATABASE_URL}
      - LOG_FILE=/log/bitwarden.log
    depends_on:
      - mariadb
    networks:
      - frontend
      - backend

  keycloak:
    environment:
      - KEYCLOAK_PRODUCTION=${KEYCLOAK_PRODUCTION}
      - KEYCLOAK_PROXY_HEADERS=${KEYCLOAK_PROXY_HEADERS-''}

  mongo:
    command: mongod --replSet rs0 --dbpath /data/db --port 27017
    volumes:
      - ${DATA_PATH_HOST}/mongo:/data/db
      - ${DATA_PATH_HOST}/mongo_config:/data/configdb
      - ./mongo/scripts:/scripts
    depends_on:
      - mongo-replica

  mongo-replica:
    command: mongod --replSet rs0 --dbpath /data/db --port 27018
    extends:
      service: mongo
      file: ./docker-compose.yml
    ports: !override
      - "27018:27018"
    volumes:
      - ${DATA_PATH_HOST}/mongo-replica:/data/db
      - ${DATA_PATH_HOST}/mongo_config:/data/configdb

  tabby:
    build: ./tabby-web
    restart: always
    depends_on:
      - mariadb
    ports:
      - ${TABBY_PORT}:80
    networks:
      - backend
    environment:
      # mysql://root:123@db/tabby
      - DATABASE_URL=${TABBY_DATABASE_URL}
      - PORT=80
      - DEBUG=False
      - SOCIAL_AUTH_GOOGLE_OAUTH2_KEY=${TABBY_SOCIAL_AUTH_GOOGLE_OAUTH2_KEY}
      - SOCIAL_AUTH_GOOGLE_OAUTH2_SECRET=${TABBY_SOCIAL_AUTH_GOOGLE_OAUTH2_SECRET}
      - DOCKERIZE_ARGS="-wait tcp://db:3306 -timeout 60s"
      - SOCIAL_AUTH_REDIRECT_IS_HTTPS=True
    # - APP_DIST_STORAGE="file:///app-dist"

  tabby-gateway:
    image: ghcr.io/eugeny/tabby-connection-gateway:master
    command: --token-auth --host 0.0.0.0 --port 9000
    environment:
      - TABBY_AUTH_TOKEN=${TABBY_GATEWAY_AUTH_TOKEN}
    restart: always
    networks:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mattermost:
    depends_on:
      - postgres
    image: mattermost/${MATTERMOST_IMAGE}:${MATTERMOST_IMAGE_TAG}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - backend
    volumes:
      - ${MATTERMOST_CONFIG_PATH}:/mattermost/config:rw
      - ${MATTERMOST_DATA_PATH}:/mattermost/data:rw
      - ${MATTERMOST_LOGS_PATH}:/mattermost/logs:rw
      - ${MATTERMOST_PLUGINS_PATH}:/mattermost/plugins:rw
      - ${MATTERMOST_CLIENT_PLUGINS_PATH}:/mattermost/client/plugins:rw
      - ${MATTERMOST_BLEVE_INDEXES_PATH}:/mattermost/bleve-indexes:rw
      # When you want to use SSO with GitLab, you have to add the cert pki chain of GitLab inside Alpine
      # to avoid Token request failed: certificate signed by unknown authority
      # (link: https://github.com/mattermost/mattermost-server/issues/13059 and https://github.com/mattermost/docker/issues/34)
      # - ${GITLAB_PKI_CHAIN_PATH}:/etc/ssl/certs/pki_chain.pem:ro
    environment:
      # timezone inside container
      - TZ=${APP_TZ}

      # necessary Mattermost options/variables (see env.example)
      - MM_SQLSETTINGS_DRIVERNAME
      - MM_SQLSETTINGS_DATASOURCE

      # necessary for bleve
      - MM_BLEVESETTINGS_INDEXDIR

      # additional settings
      - MM_SERVICESETTINGS_SITEURL
